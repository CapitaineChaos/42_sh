# Robustesse SHLVL : valeur héritée pourrie au démarrage du shell.
# `env = { SHLVL = "..." }` surcharge l'environnement passé aux DEUX shells
# (42_sh et bash), puis on compare `echo $SHLVL`. Sans le clamp long/strtool,
# SHLVL=2147483647 débordait en entier signé (-2147483648).

[[test]]
name = "shlvl absent/vide"
env = { SHLVL = "" }
input = "echo $SHLVL"

[[test]]
name = "shlvl non numerique"
env = { SHLVL = "abc" }
input = "echo $SHLVL"

[[test]]
name = "shlvl poubelle en fin"
env = { SHLVL = "3x" }
input = "echo $SHLVL"

[[test]]
name = "shlvl negatif"
env = { SHLVL = "-5" }
input = "echo $SHLVL"

[[test]]
name = "shlvl tres negatif"
env = { SHLVL = "-999999999" }
input = "echo $SHLVL"

[[test]]
name = "shlvl espaces"
env = { SHLVL = "  7  " }
input = "echo $SHLVL"

# SHLVL=2147483647 (INT_MAX) est le cas qui débordait en int signé ; avec le
# clamp long/strtol 42_sh sort une valeur saine (1). bash sort 0 sur cette
# valeur précise (quirk bash), donc on la couvre par l'overflow "long" plus
# grand ci-dessous, où bash et 42_sh conviennent tous deux (reset -> 1).
[[test]]
name = "shlvl overflow long"
env = { SHLVL = "999999999999999999999999" }
input = "echo $SHLVL"

[[test]]
name = "shlvl zero"
env = { SHLVL = "0" }
input = "echo $SHLVL"

[[test]]
name = "shlvl normal"
env = { SHLVL = "42" }
input = "echo $SHLVL"

[[test]]
name = "shlvl prefixe hex ignore"
env = { SHLVL = "0x10" }
input = "echo $SHLVL"

[[test]]
name = "shlvl plus signe"
env = { SHLVL = "+3" }
input = "echo $SHLVL"

[[test]]
name = "shell survit a un shlvl pourri"
env = { SHLVL = "99999999999garbage" }
input = "echo alive"
